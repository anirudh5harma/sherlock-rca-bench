services:
  - type: web
    name: sherlock-rca-bench
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: RCA_AGENT_MODEL
        value: gpt-4o-mini
      - key: RCA_JUDGE_MODEL
        value: gpt-4o-mini
      - key: PYTHON_VERSION
        value: "3.12.6"
